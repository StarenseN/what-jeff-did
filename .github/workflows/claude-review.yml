name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR. Flag only P0/P1 issues. No style. No praise.
            Format: ### Must Fix / ### Should Consider / ### Summary (2 lines max)

            Use `gh pr comment` for top-level feedback.
            Only post GitHub comments - don't submit review text as messages.
          claude_args: >-
            --allowedTools
            "Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Bash(git log *),Bash(git diff *),Bash(cat *),Write,Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment"
